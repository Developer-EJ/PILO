name: Infra LocalStack Integration

on:
  pull_request:
    paths:
      - "infra/tests/github-sync-localstack-config.test.mjs"
      - "infra/scripts/create-local-sqs-queues.ps1"
      - "localstack/init/ready.d/01-create-sqs.sh"
      - "docs/infra/github-sync-operations.md"
      - ".github/workflows/infra-localstack-integration.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  github-sync-localstack:
    name: GitHub sync LocalStack configuration
    runs-on: windows-2025
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Windows runner prerequisites
        shell: pwsh
        run: |
          docker version
          $serverOsType = docker version --format '{{.Server.OsType}}'
          if ($serverOsType.Trim() -ne 'linux') {
            throw "LocalStack requires Docker Linux container mode, but the Docker server reports '$serverOsType'."
          }
          docker info
          Get-Command aws -ErrorAction Stop | Out-Null
          Get-Command powershell.exe -ErrorAction Stop | Out-Null

      - name: Verify GitHub sync LocalStack queues
        shell: pwsh
        env:
          RUN_LOCALSTACK_INTEGRATION: "1"
        run: node infra/tests/github-sync-localstack-config.test.mjs
