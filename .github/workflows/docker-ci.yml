name: Docker CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  app-server-image:
    name: app-server-image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: apps/app-server
          push: false
          tags: pilo-app-server:ci

  realtime-server-image:
    name: realtime-server-image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: apps/realtime-server
          push: false
          tags: pilo-realtime-server:ci

  ai-worker-image:
    name: ai-worker-image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: apps/ai-worker
          push: false
          tags: pilo-ai-worker:ci
