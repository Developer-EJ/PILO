name: Deploy AI Worker

on:
  push:
    branches: ["main"]
    paths:
      - "apps/ai-worker/**"
      - "docs/contracts/schemas/pilo-public-contracts.schema.json"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: pilo-ai-worker
  APP_PATH: apps/ai-worker

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/ai-worker/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Deploy ECS service
        run: |
          aws ecs update-service \
            --cluster "${{ vars.ECS_CLUSTER_NAME }}" \
            --service "${{ vars.ECS_AI_WORKER_SERVICE }}" \
            --force-new-deployment
